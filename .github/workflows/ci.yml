name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: python -m pip install -U pip && pip install -e .

      - name: Smoke test CLI
        run: |
          lyric-lily --version
          lyric-lily --help

      - name: Byte-compile sources
        run: python -m compileall -q src/lyric_lily
